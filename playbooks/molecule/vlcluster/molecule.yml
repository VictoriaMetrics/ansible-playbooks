---
dependency:
  name: galaxy
  enabled: false
driver:
  name: docker

platforms:
  - name: vlstorage-1
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-debian13}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
    networks:
      - name: vlcluster
    groups:
      - vlstorage
  - name: vlstorage-2
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-debian13}-ansible:latest"
