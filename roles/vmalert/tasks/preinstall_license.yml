- name: Ensure license key is provided
  ansible.builtin.assert:
    that: vmalert_license_key != "" or vmalert_license_key_file != ""
    msg: Either license key or license key file location must be provided.
  when: vmalert_enterprise | bool

- name: Ensure only one of key or file is provided
  ansible.builtin.assert:
    that: vmalert_license_key_file == ""
    msg: Only one of license key or license key file must be provided.
  when:
    - vmalert_enterprise | bool
    - vmalert_license_key != ""

- name: Ensure only one of key or file is provided
  ansible.builtin.assert:
    that: vmalert_license_key == ""
    msg: Only one of license key or license key file must be provided.
  when:
    - vmalert_enterprise | bool
    - vmalert_license_key_file != ""

- name: Add license key parameter to service config
  ansible.builtin.set_fact:
    vmalert_service_args: "{{ vmalert_service_args | combine({'license': vmalert_license_key}) }}"
  when:
    - vmalert_enterprise | bool
    - vmalert_license_key != ""


- name: Add license key parameter to service config
  ansible.builtin.set_fact:
    vmalert_service_args: "{{ vmalert_service_args | combine({'licenseFile': vmalert_license_key_file}) }}"
  when:
    - vmalert_enterprise | bool
    - vmalert_license_key_file != ""
