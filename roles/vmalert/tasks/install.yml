---
- name: Create VMalert system group
  ansible.builtin.group:
    name: "{{ vmalert_system_group }}"
    state: present
    system: true
  when: vmalert_system_group != "root"

- name: Create VMalert system user
  ansible.builtin.user:
    name: "{{ vmalert_system_user }}"
    groups: "{{ vmalert_system_group }}"
    append: true
    shell: /usr/sbin/nologin
    system: true
    createhome: false
  when: vmalert_system_user != "root"

- name: Ensure existence of /usr/local/bin
  ansible.builtin.file:
    path: /usr/local/bin
    state: directory
    mode: "0755"

- name: Delete existing VMalert version if it's different.
  ansible.builtin.file:
    path: /usr/local/bin/vmalert-prod
    state: absent
  when:
    - vmalert_is_installed.stat.exists | bool
    - vmalert_version not in vmalert_current_version.stdout

- name: Install via control host
  when: vmalert_install_download_to_control
  block:
    - name: Download and unarchive VMalert release binary
      environment:
        http_proxy: "{{ vm_proxy_http }}"
        https_proxy: "{{ vm_proxy_https }}"
      ansible.builtin.unarchive:
        src: "{{ vmalert_download_url }}"
        dest: /tmp
        remote_src: yes
      delegate_to: localhost
      become: no
      when:
        - not ansible_check_mode
        - not vmalert_is_installed.stat.exists or
          vmalert_version not in vmalert_current_version.stdout

    - name: Copy VMalert binary to target host
      notify: Restart VMalert service
      ansible.builtin.copy:
        src: /tmp/vmalert-prod
        dest: /tmp/vmalert-prod
        mode: "0751"
        owner: "{{ vmalert_system_user }}"
        group: "{{ vmalert_system_group }}"
      when:
        - not ansible_check_mode
        - not vmalert_is_installed.stat.exists or
          vmalert_version not in vmalert_current_version.stdout

    - name: Replace VMalert binary at target dir # noqa: no-changed-when
      notify: Restart VMalert service
      ansible.builtin.shell: |
        mv /tmp/vmalert-prod /usr/local/bin/vmalert-prod
      when:
        - not ansible_check_mode
        - not vmalert_is_installed.stat.exists or
          vmalert_version not in vmalert_current_version.stdout

- name: Install directly to target host
  when: not vmalert_install_download_to_control
  block:
    - name: Download and unarchive VMalert release binary
      environment:
        http_proxy: "{{ vm_proxy_http }}"
        https_proxy: "{{ vm_proxy_https }}"
      ansible.builtin.unarchive:
        src: "{{ vmalert_download_url }}"
        dest: /tmp
        remote_src: yes
        extra_opts:
          - --no-same-owner
      when:
        - not ansible_check_mode
        - not vmalert_is_installed.stat.exists or
          vmalert_version not in vmalert_current_version.stdout

    - name: Replace VMalert binary at target dir # noqa: no-changed-when
      notify: Restart VMalert service
      ansible.builtin.shell: |
        mv /tmp/vmalert-prod /usr/local/bin/vmalert-prod
        chmod 0751 /usr/local/bin/vmalert-prod
        chown {{ vmalert_system_user }}:{{ vmalert_system_group }} /usr/local/bin/vmalert-prod
      when:
        - not ansible_check_mode
        - not vmalert_is_installed.stat.exists or
          vmalert_version not in vmalert_current_version.stdout

- name: Restore SELinux context for vmalert binary
  ansible.builtin.command:
    cmd: restorecon -v /usr/local/bin/vmalert-prod
  register: restorecon_result
  changed_when: "'relabeled' in restorecon_result.stdout"
  when:
    - ansible_facts['selinux'] is defined
    - ansible_facts['selinux'].status == "enabled"
    - not ansible_check_mode
