service:
  "vic-vmalert":
    enabled: true
    running: true

port:
  tcp:9431:
    listening: true

file:
  /etc/systemd/system/vic-vmalert.service:
    exists: true
    contains:
      - "^Description=VictoriaMetrics VMalert service$"
      - "ProtectControlGroups=true"
      - "ProtectKernelModules=true"
      - "ProtectKernelTunables=yes"
