---
- name: Converge
  hosts: all
  become: yes
  vars:
    victoriametrics_data_dir: "/tmp/victoria-logs/"
    victoriametrics_service_args:
      storageDataPath: "{{ victoriametrics_data_dir }}"
    # Deprecated alias set on purpose to prove backward-compatible resolution.
    # Distinct from the "12" default so the assert below is not vacuous.
    victorialogs_retention_period_months: "6"
  tasks:
    - name: "Include vlsingle"
      ansible.builtin.include_role:
        name: "vlsingle"
        public: true

    - name: "Assert deprecated alias resolves into service args"
      ansible.builtin.assert:
        that:
          - vlsingle_service_args['retentionPeriod'] == '6'
        fail_msg: >-
          Deprecated alias victorialogs_retention_period_months did not resolve
          into vlsingle_service_args
