service:
  "victorialogs":
    enabled: true
    running: true

port:
  tcp:9428:
    listening: true

file:
  /etc/systemd/system/victorialogs.service:
    exists: true
    contains:
      - "^Description=VictoriaLogs service$"
      - "ProtectControlGroups=true"
      - "ProtectKernelModules=true"
      - "ProtectKernelTunables=yes"
