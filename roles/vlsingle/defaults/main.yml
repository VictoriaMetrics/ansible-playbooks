---
vlsingle_version: "{{ victorialogs_version | default('v1.52.0') }}"
vlsingle_enterprise: "{{ victorialogs_enterprise | default(false) }}"
vlsingle_license_key: "{{ victorialogs_license_key | default('') }}"
vlsingle_license_key_file: "{{ victorialogs_license_key_file | default('') }}"

vlsingle_platform: "{{ victorialogs_platform | default('linux') }}"
vlsingle_repo_url: "{{ victorialogs_repo_url | default('https://github.com/VictoriaMetrics/VictoriaLogs') }}"
vlsingle_download_url: "{{ victorialogs_download_url | default(vlsingle_repo_url ~ '/releases/download/' ~ vlsingle_version ~ '/victoria-logs-' ~ vlsingle_platform ~ '-' ~ go_arch ~ '-' ~ vlsingle_version ~ ('-enterprise' if vlsingle_enterprise else '') ~ '.tar.gz') }}"

vlsingle_system_user: "{{ victorialogs_system_user | default('victorialogs') }}"
vlsingle_system_group: "{{ victorialogs_system_group | default(vlsingle_system_user) }}"
vlsingle_data_dir: "{{ victorialogs_data_dir | default('/var/lib/victoria-logs/') }}"
# Passed verbatim to -retentionPeriod. With no unit suffix the value is counted
# in months; see the docs for the supported unit suffixes.
# https://docs.victoriametrics.com/victorialogs/#retention
vlsingle_retention_period: "{{ victorialogs_retention_period_months | default('12') }}"

# more on envflags usage
# https://docs.victoriametrics.com/Single-server-VictoriaMetrics.html#environment-variables
vlsingle_service_envflag_enabled: "{{ victorialogs_service_envflag_enabled | default('false') }}"
# Array of strings to pass
vlsingle_service_envflag_data: "{{ victorialogs_service_envflag_data | default([]) }}"
#  - "graphiteListenAddr=127.0.0.1:12345"
vlsingle_service_envflag_file: "{{ victorialogs_service_envflag_file | default('/etc/default/victoriametrics') }}"

# Download behavior
vlsingle_install_download_to_control: "{{ victorialogs_install_download_to_control | default(false) }}"

# Proxy environment for downloads
vm_proxy_http: ""
vm_proxy_https: ""

_vlsingle_service_args_default:
  storageDataPath: "{{ vlsingle_data_dir }}"
  retentionPeriod: "{{ vlsingle_retention_period }}"
vlsingle_service_args: "{{ victorialogs_service_args | default(_vlsingle_service_args_default) }}"

vlsingle_max_open_files: "{{ victorialogs_max_open_files | default(2097152) }}"
