service:
  "vic-vmagent":
    enabled: true
    running: true

port:
  tcp:8429:
    listening: true

file:
  /etc/systemd/system/vic-vmagent.service:
    exists: true
    contains:
      - "/^Description=VictoriaMetrics vmagent service$/"
      - "ProtectControlGroups=true"
      - "ProtectKernelModules=true"
      - "ProtectKernelTunables=yes"
