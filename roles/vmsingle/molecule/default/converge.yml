---
- name: Converge
  hosts: all
  become: yes
  vars:
    vmsingle_data_dir: "/tmp/victoria-metrics/"
    vmsingle_backup_enabled: false
    vmsingle_service_envflag_enabled: true
    vmsingle_service_envflag_data:
      - "graphiteListenAddr=127.0.0.1:12345"
    # Deprecated alias set on purpose to prove backward-compatible resolution.
    # Distinct from the "12" default so the assert below is not vacuous.
    victoriametrics_retention_period_months: "6"
  tasks:
    - name: "Include vmsingle"
      ansible.builtin.include_role:
        name: "vmsingle"
        public: true

    - name: "Assert deprecated alias resolves into service args"
      ansible.builtin.assert:
        that:
          - vmsingle_service_args['retentionPeriod'] == '6'
        fail_msg: >-
          Deprecated alias victoriametrics_retention_period_months did not resolve
          into vmsingle_service_args
