- name: Ensure license key is provided
  ansible.builtin.assert:
    that: vmsingle_license_key != "" or vmsingle_license_key_file != ""
    msg: Either license key or license key file location must be provided.
  when: vmsingle_enterprise | bool

- name: Ensure only one of key or file is provided
  ansible.builtin.assert:
    that: vmsingle_license_key_file == ""
    msg: Only one of license key or license key file must be provided.
  when:
    - vmsingle_enterprise | bool
    - vmsingle_license_key != ""


- name: Ensure only one of key or file is provided
  ansible.builtin.assert:
    that: vmsingle_license_key == ""
    msg: Only one of license key or license key file must be provided.
  when:
    - vmsingle_enterprise | bool
    - vmsingle_license_key_file != ""


- name: Add license key parameter to service config
  ansible.builtin.set_fact:
    vmsingle_service_args: "{{ vmsingle_service_args | combine({'license': vmsingle_license_key}) }}"
  when:
    - vmsingle_enterprise | bool
    - vmsingle_license_key != ""


- name: Add license key parameter to service config
  ansible.builtin.set_fact:
    vmsingle_service_args: "{{ vmsingle_service_args | combine({'licenseFile': vmsingle_license_key_file}) }}"
  when:
    - vmsingle_enterprise | bool
    - vmsingle_license_key_file != ""
