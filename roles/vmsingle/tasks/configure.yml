---
- name: Configure env
  when: vmsingle_service_envflag_enabled | bool
  block:
    - name: Check envfile presence
      ansible.builtin.stat:
        path: "{{ vmsingle_service_envflag_file }}"
      register: envfile_state

    - name: Setup envfile
      ansible.builtin.file:
        state: touch
        path: "{{ vmsingle_service_envflag_file }}"
        owner: root
        group: root
        mode: "0644"
        access_time: preserve
      notify: Restart VictoriaMetrics service
      when: envfile_state.stat.exists is defined and not envfile_state.stat.exists

- name: Copy VictoriaMetrics systemd unit file
  ansible.builtin.template:
    src: victoriametrics.service.j2
    dest: /etc/systemd/system/victoriametrics.service
    owner: root
    group: root
    mode: "0644"
  register: config_template
  no_log: True

- name: Daemon-reload VictoriaMetrics service
  become: true
  notify: Restart VictoriaMetrics service
  ansible.builtin.systemd:
    daemon_reload: true
    name: victoriametrics
  when: config_template is changed  # noqa: no-handler
  changed_when: config_template is changed

- name: Ensure VictoriaMetrics service is enabled on boot
  become: true
  ansible.builtin.systemd:
    name: victoriametrics
    enabled: true

- name: Configure credentials
  when:
    - vmsingle_backup_enabled | bool
    - crontab_which.rc == 0
  block:
    - name: Create aws credentials dir
      become: true
      ansible.builtin.file:
        path: ~/.aws
        state: directory
        mode: "0755"

    - name: Create aws config file
      become: true
      ansible.builtin.template:
        src: aws_config.j2
        dest: ~/.aws/config
        mode: "0600"

    - name: Template credentials file
      ansible.builtin.template:
        src: creds.j2
        dest: ~/.aws/credentials
        mode: "0600"

    - name: Set proxy config
      ansible.builtin.set_fact:
        _vmsingle_backup_proxy: "http_proxy={{ http_proxy }} https_proxy={{ http_proxy }} "
      when:
        - vmsingle_backup_proxy_enable
        - http_proxy is defined

    - name: Configure cron
      ansible.builtin.cron:
        name: "backup victoriametrics data"
        user: root
        state: present
        minute: "{{ vmsingle_backup_cron_minute }}"
        hour: "{{ vmsingle_backup_cron_hour }}"
        day: "{{ vmsingle_backup_cron_day }}"
        weekday: "{{ vmsingle_backup_cron_weekday }}"
        month: "{{ vmsingle_backup_cron_month }}"
        job: "{{ _vmsingle_backup_proxy | default('') }} /usr/local/bin/vmbackup-prod -snapshot.createURL=http://localhost:8428/snapshot/create {% if vmsingle_backup_custom_s3_endpoint != '' %} -customS3Endpoint {{ vmsingle_backup_custom_s3_endpoint }} {% endif %} -storageDataPath {{ vmsingle_data_dir }} -dst {{ vmsingle_backup_destination }}/$(date +\\%Y-\\%m-\\%d)"

- name: Delete cron if backup disabled
  ansible.builtin.cron:
    name: "backup victoriametrics data"
    user: root
    minute: "{{ vmsingle_backup_cron_minute }}"
    hour: "{{ vmsingle_backup_cron_hour }}"
    day: "{{ vmsingle_backup_cron_day }}"
    weekday: "{{ vmsingle_backup_cron_weekday }}"
    month: "{{ vmsingle_backup_cron_month }}"
    state: absent
  when:
    - not vmsingle_backup_enabled | bool
    - crontab_which.rc == 0
